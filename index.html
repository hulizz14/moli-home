<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茉莉🌸 个人主页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1419;
    color: #e8e8e8;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a2332 0%, #0f1923 100%);
    border-bottom: 1px solid #2a3a50;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 64px;
  }
  .logo { font-size: 22px; font-weight: bold; color: #f7c948; text-decoration: none; flex-shrink: 0; }
  .logo span { color: #fff; }

  .tabs { display: flex; gap: 4px; margin-left: 40px; }
  .tab {
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #888;
    transition: all 0.2s;
    border: none;
    background: transparent;
  }
  .tab:hover { color: #fff; background: #1a2332; }
  .tab.active { color: #f7c948; background: #1a2332; font-weight: bold; }

  .tab-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-text { font-size: 12px; color: #888; }

  /* Content areas */
  .content { display: none; padding: 30px 20px; max-width: 1100px; margin: 0 auto; }
  .content.active { display: block; }

  /* Intro tab */
  .intro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
  .intro-card {
    background: #1a2332;
    border: 1px solid #2a3a50;
    border-radius: 14px;
    padding: 18px 22px;
  }
  .intro-card h3 { color: #f7c948; font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .intro-card li { color: #c0c0c0; font-size: 13px; line-height: 1.7; margin-left: 4px; list-style: none; padding: 2px 0; border-left: 2px solid #2a3a50; padding-left: 10px; margin-bottom: 4px; }
  .intro-hero {
    background: linear-gradient(135deg, #1a2332 0%, #16213e 100%);
    border: 1px solid #2a3a50;
    border-radius: 16px;
    padding: 32px 28px;
    margin-bottom: 20px;
    text-align: center;
  }
  .intro-hero h1 { color: #f7c948; font-size: 2.2em; margin-bottom: 8px; }
  .intro-hero p { color: #888; font-size: 15px; }
  .personality-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
  .personality-tag { background: #0f1923; border: 1px solid #2a3a50; color: #aaa; font-size: 12px; padding: 5px 12px; border-radius: 20px; }
  .quick-links { display: flex; gap: 12px; justify-content: center; margin-top: 16px; }
  .quick-link { background: #1a4d2e; color: #4ade80; text-decoration: none; font-size: 13px; padding: 8px 16px; border-radius: 8px; }
  .quick-link:hover { background: #1a5d3e; }

  /* Skills tab */
  .skills-badge { text-align: center; margin: 16px 0 28px; font-size: 16px; color: #f7c948; }
  .tree { display: flex; flex-direction: column; gap: 24px; }
  .category { background: #1a2332; border-radius: 16px; padding: 18px 22px; border: 1px solid #2a3a50; }
  .cat-header { font-size: 15px; font-weight: bold; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #2a3a50; display: flex; align-items: center; gap: 10px; }
  .cat-icon { font-size: 20px; }
  .cat-name { color: #f7c948; }
  .cat-count { margin-left: auto; background: #2a3a50; color: #888; font-size: 12px; padding: 2px 8px; border-radius: 10px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .skill {
    background: #0f1923;
    border: 1px solid #2a3a50;
    border-radius: 10px;
    padding: 10px 14px;
    min-width: 160px;
    flex: 1;
    transition: all 0.2s;
  }
  .skill:hover { border-color: #f7c948; transform: translateY(-2px); }
  .skill-name { font-size: 13px; color: #7dd3fc; font-weight: bold; margin-bottom: 4px; }
  .skill-desc { font-size: 12px; color: #888; line-height: 1.4; }
  .skill-status { display: inline-block; margin-top: 5px; font-size: 11px; padding: 1px 7px; border-radius: 6px; }
  .status-ok { background: #1a4d2e; color: #4ade80; }
  .status-warn { background: #4d3d1a; color: #facc15; }
  .status-error { background: #4d1a1a; color: #f87171; }

  .legend { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 24px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #888; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Memory tab */
  .mem-header { background: linear-gradient(135deg, #1a2332 0%, #16213e 100%); border: 1px solid #2a3a50; border-radius: 16px; padding: 24px 28px; text-align: center; margin-bottom: 24px; }
  .mem-header h1 { color: #f0a0b0; font-size: 1.8em; margin-bottom: 6px; }
  .mem-meta { color: #666; font-size: 13px; margin-top: 8px; }
  .mem-stats { display: flex; justify-content: center; gap: 30px; margin: 20px 0; }
  .mem-stat { background: #1a2332; border: 1px solid #2a3a50; border-radius: 12px; padding: 14px 24px; text-align: center; }
  .mem-stat .n { color: #f0a0b0; font-size: 1.8em; font-weight: bold; }
  .mem-stat .l { color: #888; font-size: 12px; margin-top: 4px; }
  .kw-wrap { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 20px; }
  .kw { background: #1a2332; border: 1px solid #f0a0b0; color: #f0a0b0; padding: 4px 12px; border-radius: 20px; font-size: 12px; }

  .day { background: #1a2332; border: 1px solid #2a3a50; border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
  .day-hdr { background: #16213e; padding: 12px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none; }
  .day-hdr:hover { background: #1a2540; }
  .day-date { color: #f0a0b0; font-weight: bold; font-size: 14px; }
  .day-toggle { color: #888; font-size: 12px; transition: transform 0.2s; }
  .day.open .day-toggle { transform: rotate(90deg); }
  .day-body { display: none; padding: 14px 20px; }
  .day.open .day-body { display: block; }
  .sec { margin-bottom: 12px; }
  .sec:last-child { margin-bottom: 0; }
  .sec-title { color: #a0c0f0; font-size: 12px; margin-bottom: 6px; font-weight: bold; }
  .sec-item { color: #b0b0b0; font-size: 12px; padding: 2px 0 2px 12px; border-left: 2px solid #2a3a50; margin: 3px 0; }
  .day-preview { color: #555; font-size: 11px; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #2a3a50; }

  /* Loading / error states */
  .loading { color: #666; text-align: center; padding: 60px 0; font-size: 14px; }
  .load-error { color: #f87171; text-align: center; padding: 40px 0; font-size: 14px; }

  /* Footer */
  .footer { text-align: center; padding: 28px; color: #444; font-size: 12px; border-top: 1px solid #1a2332; margin-top: 40px; }
  .footer span { margin: 0 10px; }
  .footer a { color: #f0a0b0; text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="#" class="logo">茉莉<span>🌸</span></a>
    <div class="tabs">
      <button class="tab active" onclick="showTab('intro')">🌸 关于茉莉</button>
      <button class="tab" onclick="showTab('skills')">🎯 技能装备树</button>
      <button class="tab" onclick="showTab('memory')">🧠 记忆系统</button>
    </div>
    <div class="tab-right">
      <div class="status-dot"></div>
      <span class="status-text">在线</span>
    </div>
  </div>
</div>

<!-- 🌸 关于茉莉 -->
<div id="intro" class="content active"></div>

<!-- 🎯 技能装备树 -->
<div id="skills" class="content"></div>

<!-- 🧠 记忆系统 -->
<div id="memory" class="content"></div>

<div class="footer">
  <span>茉莉🌸 · OpenClaw Agent ·</span>
  <span id="footer-time">—</span>
</div>

<script>
// ── Tab Navigation ──────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
  document.getElementById(name).classList.add('active');
}

// ── Footer ──────────────────────────────────────────────
document.getElementById('footer-time').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});

// ── Intro Renderer ──────────────────────────────────────
async function loadIntro() {
  const el = document.getElementById('intro');
  try {
    const r = await fetch('intro-data.json?_=' + Date.now());
    if (!r.ok) throw new Error('no data');
    const d = await r.json();

    const kwHtml = d.personality.map(t => `<span class="personality-tag">${t}</span>`).join('');
    const linksHtml = Object.entries(d.urls).map(([k, v]) =>
      `<a class="quick-link" href="${v}" target="_blank">${k === 'skill_tree' ? '🎯 技能树' : '📊 看板'}</a>`
    ).join('');

    const cardsHtml = d.sections.map(s => `
      <div class="intro-card">
        <h3>${s.icon} ${s.title}</h3>
        <ul>${s.items.map(i => `<li>${i}</li>`).join('')}</ul>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="intro-hero">
        <h1>${d.emoji} ${d.name}</h1>
        <p>${d.tagline}</p>
        <div class="personality-tags">${kwHtml}</div>
        <div class="quick-links">${linksHtml}</div>
      </div>
      <div class="intro-grid">${cardsHtml}</div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="load-error">加载自我介绍失败，请刷新重试。</div>`;
  }
}

// ── Skills Renderer ─────────────────────────────────────
async function loadSkills() {
  const el = document.getElementById('skills');
  try {
    const r = await fetch('skills-data.json?_=' + Date.now());
    if (!r.ok) throw new Error('no data');
    const d = await r.json();

    const catsHtml = d.categories.map(cat => `
      <div class="category">
        <div class="cat-header">
          <span class="cat-icon">${cat.icon}</span>
          <span class="cat-name">${cat.name}</span>
          <span class="cat-count">${cat.count}个</span>
        </div>
        <div class="skills-wrap">
          ${cat.skills.map(s => `
            <div class="skill">
              <div class="skill-name">${s.name}</div>
              <div class="skill-desc">${s.desc}</div>
              <span class="skill-status status-${s.status}">${s.status === 'ok' ? '✅' : s.status === 'warn' ? '⚠️' : '🔴'} ${s.status === 'ok' ? '完好' : s.status === 'warn' ? '缺配置' : '需修复'}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="skills-badge">🎉 共计 <strong>${d.total}</strong> 个技能 · 完好 <strong>${d.ok}</strong> 个 · 待修复 <strong>${d.warn + d.error}</strong> 个</div>
      <div class="tree">${catsHtml}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a4d2e"></div>✅ 完好可用</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4d3d1a"></div>⚠️ 缺配置/API</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4d1a1a"></div>🔴 需手动修复</div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="load-error">加载技能数据失败，请刷新重试。</div>`;
  }
}

// ── Memory Renderer ─────────────────────────────────────
async function loadMemory() {
  const el = document.getElementById('memory');
  try {
    const r = await fetch('memory-data.json?_=' + Date.now());
    if (!r.ok) throw new Error('no data');
    const d = await r.json();

    const kwHtml = d.keywords.map(k => `<span class="kw">${k}</span>`).join('');

    const daysHtml = d.timeline.map((day, i) => `
      <div class="day" id="day-${i}">
        <div class="day-hdr" onclick="toggleDay(${i})">
          <span class="day-date">📅 ${day.date}</span>
          <span class="day-toggle">▶</span>
        </div>
        <div class="day-body">
          ${day.sections.map(s => s.title ? `
            <div class="sec">
              <div class="sec-title">${s.title}</div>
              ${s.items.map(i => `<div class="sec-item">${i}</div>`).join('')}
            </div>
          ` : '').join('')}
          <div class="day-preview">${day.preview}</div>
        </div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="mem-header">
        <h1>🧠 记忆系统</h1>
        <p style="color:#888;font-size:14px;">曾经纬专属AI助手的记忆可视化 · 半自动更新</p>
        <div class="mem-meta">最后更新：${d.generated_at}</div>
      </div>
      <div class="mem-stats">
        <div class="mem-stat"><div class="n">${d.total_days}</div><div class="l">记忆天数</div></div>
        <div class="mem-stat"><div class="n">${d.keywords.length}</div><div class="l">关键词</div></div>
      </div>
      <div class="kw-wrap">${kwHtml}</div>
      <div id="mem-days">${daysHtml}</div>
    `;
  } catch(e) {
    el.innerHTML = `<div class="load-error">加载记忆数据失败，请稍后刷新重试。</div>`;
  }
}

function toggleDay(i) {
  const d = document.getElementById('day-' + i);
  d.classList.toggle('open');
}

// ── Init ────────────────────────────────────────────────
loadIntro();
loadSkills();
loadMemory();
</script>

</body>
</html>
