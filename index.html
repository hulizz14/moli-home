<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茉莉🌸 个人主页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1419; color: #e8e8e8; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #1a2332 0%, #0f1923 100%);
    border-bottom: 1px solid #2a3a50;
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; padding: 0 24px; height: 64px; }
  .logo { font-size: 22px; font-weight: bold; color: #f7c948; text-decoration: none; flex-shrink: 0; }
  .logo span { color: #fff; }

  .tabs { display: flex; gap: 4px; margin-left: 40px; }
  .tab { padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; color: #888; transition: all 0.2s; border: none; background: transparent; }
  .tab:hover { color: #fff; background: #1a2332; }
  .tab.active { color: #f7c948; background: #1a2332; font-weight: bold; }

  .tab-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-text { font-size: 12px; color: #888; }

  .content { display: none; padding: 28px 20px; max-width: 1100px; margin: 0 auto; }
  .content.active { display: block; }

  /* ── 通用卡片 ── */
  .card { background: #1a2332; border: 1px solid #2a3a50; border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; }
  .card-title { font-size: 15px; font-weight: bold; color: #f7c948; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card-title .icon { font-size: 18px; }
  .card-sub { font-size: 12px; color: #666; margin-bottom: 12px; }

  /* ── 关于页面 ── */
  .section-header { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 12px; padding-bottom: 6px; border-bottom: 1px solid #2a3a50; }
  .section-header:first-child { margin-top: 0; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .info-item { background: #0f1923; border-radius: 8px; padding: 10px 14px; }
  .info-label { font-size: 11px; color: #888; margin-bottom: 3px; }
  .info-value { font-size: 13px; color: #e0e0e0; }
  .info-value.highlight { color: #f7c948; }

  ul.capability-list { list-style: none; padding: 0; }
  ul.capability-list li { font-size: 13px; color: #c0c0c0; padding: 5px 0; border-bottom: 1px solid #1a2332; }
  ul.capability-list li:last-child { border-bottom: none; }

  .principle-tag { display: inline-block; background: #1a2332; border: 1px solid #2a3a50; color: #aaa; font-size: 12px; padding: 4px 10px; border-radius: 6px; margin: 3px; }

  .asset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
  .asset-card { background: #0f1923; border-radius: 10px; padding: 12px; text-align: center; }
  .asset-name { font-size: 12px; color: #888; margin-bottom: 4px; }
  .asset-val { font-size: 15px; color: #4ade80; font-weight: bold; }
  .asset-sub { font-size: 11px; color: #666; margin-top: 2px; }

  /* ── 技能树 ── */
  .skills-badge { text-align: center; margin: 12px 0 24px; font-size: 15px; color: #f7c948; }
  .tree { display: flex; flex-direction: column; gap: 20px; }
  .category { background: #1a2332; border-radius: 14px; padding: 16px 20px; border: 1px solid #2a3a50; }
  .cat-header { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #2a3a50; display: flex; align-items: center; gap: 8px; }
  .cat-icon { font-size: 18px; }
  .cat-name { color: #f7c948; }
  .cat-count { margin-left: auto; background: #2a3a50; color: #888; font-size: 11px; padding: 2px 7px; border-radius: 8px; }
  .skills-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill { background: #0f1923; border: 1px solid #2a3a50; border-radius: 8px; padding: 8px 12px; min-width: 140px; flex: 1; transition: all 0.2s; }
  .skill:hover { border-color: #f7c948; transform: translateY(-1px); }
  .skill-name { font-size: 12px; color: #7dd3fc; font-weight: bold; margin-bottom: 3px; }
  .skill-desc { font-size: 11px; color: #888; line-height: 1.3; }
  .skill-status { display: inline-block; margin-top: 4px; font-size: 10px; padding: 1px 6px; border-radius: 5px; }
  .status-ok { background: #1a4d2e; color: #4ade80; }
  .status-warn { background: #4d3d1a; color: #facc15; }
  .status-error { background: #4d1a1a; color: #f87171; }
  .legend { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #888; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; }

  /* ── 记忆系统 ── */
  .mem-hero { background: linear-gradient(135deg, #1a2332 0%, #16213e 100%); border: 1px solid #2a3a50; border-radius: 16px; padding: 28px; text-align: center; margin-bottom: 20px; }
  .mem-hero h1 { color: #f0a0b0; font-size: 1.6em; margin-bottom: 6px; }
  .mem-hero p { color: #888; font-size: 13px; }
  .mem-meta { color: #555; font-size: 12px; margin-top: 6px; }
  .mem-stats { display: flex; justify-content: center; gap: 24px; margin: 18px 0; }
  .mem-stat { background: #1a2332; border: 1px solid #2a3a50; border-radius: 12px; padding: 12px 20px; text-align: center; }
  .mem-stat .n { color: #f0a0b0; font-size: 1.6em; font-weight: bold; }
  .mem-stat .l { color: #888; font-size: 11px; margin-top: 3px; }

  .tier-card { border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
  .tier-card.hot { background: linear-gradient(135deg, #2d1a1a 0%, #1a2332 100%); border: 1px solid #5a2a2a; }
  .tier-card.warm { background: linear-gradient(135deg, #2a2a1a 0%, #1a2332 100%); border: 1px solid #5a5a2a; }
  .tier-card.cold { background: linear-gradient(135deg, #1a1a2d 0%, #1a2332 100%); border: 1px solid #2a2a5a; }
  .tier-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .tier-name { font-size: 15px; font-weight: bold; }
  .tier-size { margin-left: auto; font-size: 11px; color: #555; }
  .tier-limit { font-size: 11px; color: #444; margin-bottom: 8px; }
  .tier-content { font-size: 12px; color: #b0b0b0; line-height: 1.6; }
  .tier-content li { margin: 4px 0; padding-left: 8px; border-left: 2px solid #2a3a50; }

  .kw-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; justify-content: center; }
  .kw { background: #1a2332; border: 1px solid #f0a0b0; color: #f0a0b0; padding: 3px 10px; border-radius: 20px; font-size: 11px; }

  .core-block { background: #0f1923; border-radius: 10px; padding: 14px 16px; margin-top: 12px; }
  .core-title { color: #facc15; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
  .core-item { font-size: 12px; color: #b0b0b0; padding: 3px 0; }
  .core-item span { color: #4ade80; }

  /* ── 定时任务 ── */
  .cron-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .cron-card { background: #1a2332; border: 1px solid #2a3a50; border-radius: 12px; padding: 16px; transition: all 0.2s; }
  .cron-card:hover { border-color: #4ade80; }
  .cron-card.disabled { opacity: 0.5; }
  .cron-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cron-icon { font-size: 18px; }
  .cron-name { font-size: 14px; font-weight: bold; color: #e0e0e0; }
  .cron-time { margin-left: auto; background: #0f1923; border: 1px solid #2a3a50; color: #facc15; font-size: 11px; padding: 2px 8px; border-radius: 6px; }
  .cron-desc { font-size: 12px; color: #888; line-height: 1.5; margin-bottom: 8px; }
  .cron-status { display: flex; align-items: center; gap: 6px; font-size: 11px; }
  .cron-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .cron-dot.green { background: #4ade80; box-shadow: 0 0 4px #4ade80; }
  .cron-dot.red { background: #f87171; }
  .cron-dot.yellow { background: #facc15; }
  .cron-last { font-size: 11px; color: #555; margin-left: auto; }

  .cron-section-title { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 1px solid #1a2332; }
  .cron-section-title:first-child { margin-top: 0; }

  /* ── 页脚 ── */
  .footer { text-align: center; padding: 24px; color: #444; font-size: 12px; border-top: 1px solid #1a2332; margin-top: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <a href="#" class="logo">茉莉<span>🌸</span></a>
    <div class="tabs">
      <button class="tab active" onclick="showTab('about')">🌸 关于</button>
      <button class="tab" onclick="showTab('skills')">🎯 技能树</button>
      <button class="tab" onclick="showTab('memory')">🧠 记忆</button>
      <button class="tab" onclick="showTab('cron')">⏰ 定时</button>
    </div>
    <div class="tab-right">
      <div class="status-dot"></div>
      <span class="status-text">在线</span>
    </div>
  </div>
</div>

<!-- 🌸 关于 -->
<div id="about" class="content active"></div>

<!-- 🎯 技能树 -->
<div id="skills" class="content"></div>

<!-- 🧠 记忆系统 -->
<div id="memory" class="content"></div>

<!-- ⏰ 定时任务 -->
<div id="cron" class="content"></div>

<div class="footer">
  茉莉🌸 · OpenClaw Agent · <span id="footer-date"></span>
</div>

<script>
// ── Tab ───────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${name}')"]`).classList.add('active');
  document.getElementById(name).classList.add('active');
}
document.getElementById('footer-date').textContent = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'long',day:'numeric'});

// ── 关于 ───────────────────────────────────────────────
async function loadAbout() {
  const el = document.getElementById('about');
  try {
    const data = window._introData;

    const 茉莉 = data['茉莉'] || {};
    const 老大 = data['老大'] || {};

    el.innerHTML = `
      <!-- 关于茉莉 -->
      <div class="section-header">🌸 关于茉莉</div>

      <div class="card">
        <div class="card-title"><span class="icon">👤</span>基础信息</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">名字</div><div class="info-value highlight">${茉莉?.基础信息.名字}</div></div>
          <div class="info-item"><div class="info-label">年龄</div><div class="info-value">${茉莉?.基础信息.年龄}</div></div>
          <div class="info-item"><div class="info-label">性格</div><div class="info-value">${茉莉?.基础信息.性格}</div></div>
          <div class="info-item"><div class="info-label">爱好</div><div class="info-value">${茉莉?.基础信息.爱好}</div></div>
        </div>
        <div class="card-sub" style="margin-top:12px;">原则</div>
        <div>${茉莉?.基础信息.原则.map(p => `<span class="principle-tag">${p}</span>`).join('')}</div>
        <div class="card-sub" style="margin-top:12px;">工作习惯</div>
        <div class="info-value" style="font-size:12px;color:#aaa;">${茉莉?.基础信息.工作习惯}</div>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">💼</span>工作信息</div>
        <div class="info-grid" style="margin-bottom:12px;">
          <div class="info-item"><div class="info-label">职责</div><div class="info-value highlight">${茉莉?.工作信息.职责}</div></div>
        </div>
        <div class="card-sub">主要工作内容</div>
        <ul class="capability-list">${茉莉?.工作信息.主要工作内容.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">⚡</span>目前能力</div>
        <ul class="capability-list">${茉莉?.工作信息.目前能力.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">🚀</span>发展方向</div>
        <ul class="capability-list">${茉莉?.发展方向.map(c => `<li>${c}</li>`).join('')}</ul>
      </div>

      <!-- 关于老大 -->
      <div class="section-header">👤 关于老大</div>

      <div class="card">
        <div class="card-title"><span class="icon">👤</span>基础信息</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">名字</div><div class="info-value highlight">${老大?.基础信息.名字}</div></div>
          <div class="info-item"><div class="info-label">称呼</div><div class="info-value">${老大?.基础信息.称呼}</div></div>
          <div class="info-item"><div class="info-label">性格</div><div class="info-value">${老大?.基础信息.性格}</div></div>
          <div class="info-item"><div class="info-label">爱好</div><div class="info-value">${老大?.基础信息.爱好}</div></div>
        </div>
        <div class="card-sub" style="margin-top:12px;">原则</div>
        <div>${老大?.基础信息.原则.map(p => `<span class="principle-tag">${p}</span>`).join('')}</div>
        <div class="card-sub" style="margin-top:12px;">工作习惯</div>
        <div class="info-value" style="font-size:12px;color:#aaa;">${老大?.基础信息.工作习惯}</div>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">🏢</span>第一职业 — ${老大?.第一职业.公司}</div>
        <div class="info-grid" style="margin-bottom:14px;">
          <div class="info-item"><div class="info-label">职位</div><div class="info-value highlight">${老大?.第一职业.职位}</div></div>
          <div class="info-item"><div class="info-label">业务</div><div class="info-value">${老大?.第一职业.业务}</div></div>
        </div>
        <div class="asset-grid">
          <div class="asset-card"><div class="asset-name">财富中心</div><div class="asset-val">12.11亿</div><div class="asset-sub">624套已售/575套待售</div></div>
          <div class="asset-card"><div class="asset-name">天屿花城</div><div class="asset-val">40.66亿</div><div class="asset-sub">2233套已售/661套待售</div></div>
          <div class="asset-card"><div class="asset-name">集团合计</div><div class="asset-val">52.77亿</div><div class="asset-sub">2857套已售/1236套待售</div></div>
        </div>
        <div class="card-sub" style="margin-top:12px;">成本数据</div>
        <div class="info-value">应付 <span style="color:#4ade80">19.67亿</span>，已付 17.50亿，待付 2.18亿</div>
        <div class="card-sub" style="margin-top:8px;">日常管理</div>
        <div class="info-value" style="font-size:12px;">${老大?.第一职业.日常管理}</div>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">📊</span>副业</div>
        <ul class="capability-list">${老大?.副业.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>

      <div class="card">
        <div class="card-title"><span class="icon">🔐</span>个人信息</div>
        <div class="info-grid">
          <div class="info-item"><div class="info-label">飞书ID</div><div class="info-value" style="font-size:12px;">${老大?.个人信息.飞书ID}</div></div>
          <div class="info-item"><div class="info-label">主要渠道</div><div class="info-value">${老大?.个人信息.主要渠道}</div></div>
          <div class="info-item"><div class="info-label">备份</div><div class="info-value" style="font-size:11px;">${老大?.个人信息.备份}</div></div>
        </div>
      </div>
    `;
  } catch(e) {
    el.innerHTML = `<div style="color:#f87171;text-align:center;padding:60px 0;">加载失败，请刷新重试。</div>`;
  }
}

// ── 技能树 ───────────────────────────────────────────────
async function loadSkills() {
  const el = document.getElementById('skills');
  try {
    const d = await (await fetch('skills-data.json?_=' + Date.now())).json();
    el.innerHTML = `<div class="skills-badge">🎉 共计 <strong>${d.total}</strong> 个技能 · 完好 <strong>${d.ok}</strong> 个 · 待修复 <strong>${d.warn + d.error}</strong> 个</div>
      <div class="tree">${d.categories.map(cat => `
        <div class="category">
          <div class="cat-header">
            <span class="cat-icon">${cat.icon}</span>
            <span class="cat-name">${cat.name}</span>
            <span class="cat-count">${cat.count}个</span>
          </div>
          <div class="skills-wrap">
            ${cat.skills.map(s => `
              <div class="skill">
                <div class="skill-name">${s.name}</div>
                <div class="skill-desc">${s.desc}</div>
                <span class="skill-status status-${s.status}">${s.status === 'ok' ? '✅' : s.status === 'warn' ? '⚠️' : '🔴'} ${s.status === 'ok' ? '完好' : s.status === 'warn' ? '缺配置' : '需修复'}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1a4d2e"></div>✅ 完好可用</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4d3d1a"></div>⚠️ 缺配置/API</div>
        <div class="legend-item"><div class="legend-dot" style="background:#4d1a1a"></div>🔴 需手动修复</div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:#f87171;text-align:center;padding:60px 0;">加载失败，请刷新重试。</div>`;
  }
}

// ── 记忆系统 ─────────────────────────────────────────────
async function loadMemory() {
  const el = document.getElementById('memory');
  try {
    const d = await (await fetch('memory-data.json?_=' + Date.now())).json();

    const tiers = [
      { layer: 'hot', label: '🔥 HOT', emoji: '🔥', cls: 'hot', limit: '≤2KB',
        desc: '当前会话+进行中任务+立即目标。每session重置，只保留真正热的。',
        items: ['当前会话任务', '进行中工作', '今日待确认'],
        detail: (d.tiers?.hot?.content || []).filter(Boolean) },
      { layer: 'warm', label: '🌡️ WARM', emoji: '🌡️', cls: 'warm', limit: '≤5KB',
        desc: '用户偏好+稳定配置+常用技能状态。变更时更新。',
        items: ['用户偏好', '系统偏好', '当前项目', '技能状态'],
        detail: (d.tiers?.warm?.content || []).filter(Boolean) },
      { layer: 'cold', label: '❄️ COLD', emoji: '❄️', cls: 'cold', limit: '≤10KB',
        desc: '长期归档：身份、教训库、项目里程碑。不含细节。',
        items: ['核心身份', '教训库(永不犯)', '项目里程碑', '禁止事项'],
        detail: (d.tiers?.cold?.content || []).filter(Boolean) },
    ];

    const tierCards = tiers.map(t => `
      <div class="tier-card ${t.cls}">
        <div class="tier-header">
          <span style="font-size:18px;">${t.emoji}</span>
          <span class="tier-name">${t.label}</span>
          <span class="tier-limit">${t.limit}</span>
        </div>
        <div style="font-size:11px;color:#666;margin-bottom:10px;">${t.desc}</div>
        <div class="tier-content">
          <ul style="padding-left:0;list-style:none;">
            ${t.detail.map(line => `<li>${line}</li>`).join('')}
          </ul>
        </div>
      </div>
    `).join('');

    el.innerHTML = `
      <div class="mem-hero">
        <h1>🧠 记忆系统</h1>
        <p>三层架构 · Token最小化 · 每日自动整理</p>
        <div class="mem-meta">最后更新：${d.generated_at} · 共 ${d.total_days} 天记忆</div>
      </div>
      <div class="mem-stats">
        <div class="mem-stat"><div class="n">${d.total_days}</div><div class="l">记忆天数</div></div>
        <div class="mem-stat"><div class="n">${d.keywords.length}</div><div class="l">关键词</div></div>
        <div class="mem-stat"><div class="n">3</div><div class="l">层级</div></div>
      </div>

      <div class="section-header">📐 三层架构</div>
      ${tierCards}

      <div class="section-header">⚡ 核心工作逻辑</div>
      <div class="card">
        <div class="core-title">🎯 核心工作任务</div>
