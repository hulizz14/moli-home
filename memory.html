<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌸 茉莉记忆系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    /* 顶部标题 */
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid #2a2a4a;
    }
    .header h1 { color: #f0a0b0; font-size: 2em; margin-bottom: 10px; }
    .header .meta {
      color: #888;
      font-size: 0.9em;
      margin-top: 8px;
    }

    /* 统计卡片 */
    .stats {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 30px 20px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 20px 30px;
      text-align: center;
      min-width: 140px;
    }
    .stat-card .num { color: #f0a0b0; font-size: 2em; font-weight: bold; }
    .stat-card .label { color: #888; font-size: 0.85em; margin-top: 5px; }

    /* 关键词 */
    .keywords {
      max-width: 800px;
      margin: 0 auto 30px;
      padding: 20px;
      text-align: center;
    }
    .keyword {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #f0a0b0;
      color: #f0a0b0;
      padding: 5px 14px;
      border-radius: 20px;
      margin: 4px;
      font-size: 0.85em;
    }

    /* 时间线 */
    .timeline {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }
    .day {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .day-header {
      background: #16213e;
      padding: 14px 20px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .day-header:hover { background: #1a2540; }
    .day-header .date { color: #f0a0b0; font-weight: bold; font-size: 1.05em; }
    .day-header .toggle { color: #888; transition: transform 0.2s; }
    .day.open .toggle { transform: rotate(90deg); }

    .day-body {
      display: none;
      padding: 16px 20px;
    }
    .day.open .day-body { display: block; }

    .section { margin-bottom: 14px; }
    .section:last-child { margin-bottom: 0; }
    .section-title { color: #a0c0f0; font-size: 0.9em; margin-bottom: 6px; }
    .section-item {
      color: #c0c0c0;
      padding: 3px 0 3px 12px;
      font-size: 0.88em;
      border-left: 2px solid #2a2a4a;
      margin: 4px 0;
    }

    .preview {
      color: #666;
      font-size: 0.8em;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed #2a2a4a;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🌸 茉莉记忆系统</h1>
  <p>曾经纬的专属AI助手 · 记忆可视化</p>
  <div class="meta">最后更新: 2026-03-26 08:53:24</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="num">1</div>
    <div class="label">记忆天数</div>
  </div>
  <div class="stat-card">
    <div class="num">5</div>
    <div class="label">关键词</div>
  </div>
</div>

<div class="keywords">
  <span class="keyword">关键教训</span> <span class="keyword">网站最终状态（23:00）</span> <span class="keyword">GitHub Pages 灾难恢复</span> <span class="keyword">今日数据修正</span> <span class="keyword">老大指令记录</span>
</div>

<div class="timeline" id="timeline"></div>

function render() {
  const tl = document.getElementById('timeline');
  STATE.timeline.forEach((day, i) => {
    const el = document.createElement('div');
    el.className = 'day';
    el.innerHTML = `
      <div class="day-header" onclick="toggle($i)">
        <span class="date">📅 {day.date}</span>
        <span class="toggle">▶</span>
      </div>
      <div class="day-body">
        ${day.sections.map(s => `
          <div class="section">
            <div class="section-title">${s.title}</div>
            ${s.items.map(item => `<div class="section-item">${item}</div>`).join('')}
          </div>
        `).join('')}
        <div class="preview">${day.preview}</div>
      </div>
    `;
    tl.appendChild(el);
  });
}

function toggle(i) {
  const days = document.querySelectorAll('.day');
  days[i].classList.toggle('open');
}

render();
</script>

</body>
</html>
